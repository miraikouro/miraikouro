<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みらい航路シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --main: #1e293b; --accent: #c5a059; --bg: #f8fafc; --red: #ef4444; --blue: #3b82f6; --gray: #94a3b8; --green: #10b981; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; font-size: 14px; color: #334155; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--main); }
        h2 { text-align: center; color: var(--main); margin: 0 0 20px 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; font-size: 20px; }
        .section-title { font-size: 13px; font-weight: bold; color: var(--main); margin: 15px 0 8px; border-left: 5px solid var(--accent); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .item { display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #64748b; font-weight: 600; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .preset-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .btn-p { background: white; border: 1px solid #cbd5e1; color: #475569; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .ev-row { display: flex; gap: 6px; margin-bottom: 8px; background: #f1f5f9; padding: 10px; border-radius: 10px; align-items: center; }
        .plus-minus { display: flex; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; background: white; }
        .pm-btn { border: none; padding: 8px 12px; font-weight: bold; cursor: pointer; color: #94a3b8; background: white; }
        .pm-btn.active.minus { background: var(--red); color: white; }
        .pm-btn.active.plus { background: var(--blue); color: white; }
        .btn-calc { background: var(--main); color: white; padding: 16px; width: 100%; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-sub { background: #fff; color: #475569; border: 1px solid #cbd5e1; padding: 10px; width: 48%; border-radius: 10px; cursor: pointer; font-size: 12px; margin-top: 12px; font-weight: bold; }
        .btn-pdf { background: var(--accent); color: white; border: none; }
        #alert { display: none; margin-top: 15px; padding: 15px; border-radius: 10px; background: #fff1f2; color: var(--red); border: 2px solid var(--red); text-align: center; font-weight: bold; font-size: 16px; }
        .table-wrap { overflow-x: auto; margin-top: 25px; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #f8fafc; color: #475569; padding: 12px 6px; border-bottom: 2px solid #e2e8f0; }
        td { border-bottom: 1px solid #f1f5f9; padding: 12px 6px; text-align: right; }
        .row-ev { background: #fffbeb; }
        .row-empty { color: var(--red); font-weight: bold; background: #fff1f2; }
        .diff-plus { color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>みらい航路シミュレーター</h2>
    <div class="no-print">
        <div class="section-title">資産をつくる（積立期）</div>
        <div class="grid">
            <div class="item"><label>現在の資産(円)</label><input type="number" id="cap" placeholder="例: 1000000"></div>
            <div class="item"><label>運用年利(%)</label><input type="number" id="yld" placeholder="例: 5"></div>
            <div class="item"><label>毎月の積立額(円)</label><input type="number" id="dep" placeholder="例: 50000"></div>
            <div class="item"><label>積立期間(年)</label><input type="number" id="dep_yrs" placeholder="例: 20"></div>
        </div>
        <div class="section-title">資産を活かす（リタイア期）</div>
        <div class="grid">
            <div class="item"><label>引退後の取崩(月額)</label><input type="number" id="with" placeholder="例: 150000"></div>
            <div class="item"><label>シミュレーション期間(年)</label><input type="number" id="total" placeholder="例: 50"></div>
        </div>
        <div class="section-title">ライフイベント</div>
        <div class="preset-btns">
            <button class="btn-p" onclick="addEv('大学入学', -1)">＋ 大学入学</button>
            <button class="btn-p" onclick="addEv('住宅購入', -1)">＋ 住宅購入</button>
            <button class="btn-p" onclick="addEv('退職金', 1)">＋ 退職金</button>
            <button class="btn-p" onclick="addEv('追加', -1)">＋ 追加</button>
        </div>
        <div id="evList"></div>
        <button class="btn-calc" onclick="run()">シミュレーションする！</button>
        <div id="alert"></div>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-sub" onclick="exportCSV()">CSVで保存</button>
            <button class="btn-sub btn-pdf" onclick="window.print()">レポート出力(PDF)</button>
        </div>
    </div>
    <div style="height: 350px; margin-top: 20px;"><canvas id="chart"></canvas></div>
    <div id="out" class="table-wrap"></div>
</div>
<script>
let myChart = null;
let results = [];

function addEv(name, sign = -1) {
    const div = document.createElement('div');
    div.className = 'ev-row';
    div.innerHTML = `
        <input type="text" value="${name}" class="ev-name" placeholder="内容" style="width:30%">
        <input type="number" class="ev-year" placeholder="年後" style="width:12%">
        <div class="plus-minus">
            <button class="pm-btn plus ${sign===1?'active':''}" onclick="setSign(this, 1)">＋</button>
            <button class="pm-btn minus ${sign===-1?'active':''}" onclick="setSign(this, -1)">ー</button>
        </div>
        <input type="number" class="ev-amt" placeholder="金額" style="width:28%">
        <input type="hidden" class="ev-sign" value="${sign}">
        <button onclick="this.parentElement.remove()" style="border:none; background:none; cursor:pointer; color:#94a3b8;">✕</button>
    `;
    document.getElementById('evList').appendChild(div);
}

function setSign(btn, val) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.pm-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    parent.parentElement.querySelector('.ev-sign').value = val;
}

function run() {
    const cap = parseFloat(document.getElementById('cap').value) || 0;
    const yldInput = parseFloat(document.getElementById('yld').value) || 0;
    const yld = yldInput / 100 / 12;
    const dep = parseFloat(document.getElementById('dep').value) || 0;
    const depY = parseInt(document.getElementById('dep_yrs').value) || 0;
    const withdr = parseFloat(document.getElementById('with').value) || 0;
    const totalY = parseInt(document.getElementById('total').value) || 1;

    let evs = {};
    document.querySelectorAll('.ev-row').forEach(row => {
        let y = parseInt(row.querySelector('.ev-year').value);
        let s = parseInt(row.querySelector('.ev-sign').value);
        let a = (parseFloat(row.querySelector('.ev-amt').value) || 0) * s;
        if (y > 0) evs[y] = { n: row.querySelector('.ev-name').value, a: a };
    });

    let cur = cap, curBase = cap, lbls = [], v_yld = [], v_base = [];
    results = [];
    let emptyYear = null;
    let html = '<table><thead><tr><th>時期</th><th>年初</th><th>運用あり</th><th>元本(0%)</th><th>運用益</th></tr></thead><tbody>';

    for (let y = 1; y <= totalY; y++) {
        let start = cur;
        for (let m = 0; m < 12; m++) {
            let monthlyChange = (y <= depY) ? dep : -withdr;
            cur += monthlyChange;
            curBase += monthlyChange;
            cur += (cur > 0) ? (cur * yld) : 0;
        }
        
        if (evs[y]) {
            cur += evs[y].a;
            curBase += evs[y].a;
        }

        if (cur <= 0 && emptyYear === null) emptyYear = y;
        if (cur < 0) cur = 0;
        if (curBase < 0) curBase = 0;

        let diff = Math.round(cur - curBase);

        lbls.push(y + "年後");
        v_yld.push(Math.round(cur));
        v_base.push(Math.round(curBase));
        results.push({y:y, s:start, e:cur, b:curBase, d:diff, ev:evs[y]?evs[y].n:''});

        let rowClass = evs[y] ? 'row-ev' : '';
        if (cur <= 0 && start > 0) rowClass = 'row-empty';
        
        html += `<tr class="${rowClass}">
            <td>${y}年後</td>
            <td>${Math.round(start).toLocaleString()}</td>
            <td><b>${Math.round(cur).toLocaleString()}</b></td>
            <td style="color:#94a3b8">${Math.round(curBase).toLocaleString()}</td>
            <td class="${diff > 0 ? 'diff-plus' : ''}">${diff > 0 ? '+' : ''}${diff.toLocaleString()}</td>
        </tr>`;
    }
    document.getElementById('out').innerHTML = html + '</tbody></table>';

    const alertBox = document.getElementById('alert');
    if (emptyYear !== null) {
        alertBox.style.display = 'block';
        alertBox.innerHTML = `⚠️ 警告：運用しても <b>${emptyYear}年後</b> に資産が底をつきます！`;
    } else {
        alertBox.style.display = 'none';
    }

    const ctx = document.getElementById('chart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: lbls,
            datasets: [
                { label: '運用あり ('+yldInput+'%)', data: v_yld, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3, borderWidth: 3 },
                { label: '元本のみ (0%)', data: v_base, borderColor: '#94a3b8', borderDash: [5,5], fill: false, tension: 0.1 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() + '円' } } }
        }
    });
}

function exportCSV() {
    if (results.length === 0) return alert("実行してください");
    let csv = "\uFEFF時期,年初,年末(運用),元本,運用益,イベント\n";
    results.forEach(r => { csv += `${r.y}年後,${Math.round(r.s)},${Math.round(r.e)},${Math.round(r.b)},${r.d},${r.ev}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob); link.download = "みらい航路.csv"; link.click();
}
window.onload = run;
</script>
</body>
</html>
