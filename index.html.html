<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みらい航路シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --main: #1a2a44; --accent: #c5a059; --bg: #f4f7f6; --red: #e53e3e; --green: #27ae60; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--main); position: relative; }
        h2 { text-align: center; color: var(--main); margin: 0 0 20px 0; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        
        /* 印刷時に隠す要素 */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .no-print { display: none !important; }
            .chart-wrap { page-break-inside: avoid; }
            table { font-size: 10px; }
            h2::after { content: " - ライフプラン診断書"; font-size: 14px; }
        }

        .section-title { font-size: 12px; font-weight: bold; color: var(--main); margin: 15px 0 8px; border-left: 4px solid var(--accent); padding-left: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .item { display: flex; flex-direction: column; }
        label { font-size: 10px; margin-bottom: 3px; color: #666; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }

        #alert { display: none; background: #fff5f5; border: 1px solid #feb2b2; color: #e53e3e; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }

        .preset-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .btn-p { background: white; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 15px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        .ev-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid #eee; }
        .ev-n { flex: 2; min-width: 100px; } 
        .ev-y { width: 65px; } 
        .ev-a { flex: 1.5; min-width: 80px; }
        
        .type-switch { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; }
        .type-btn { padding: 8px 10px; font-size: 12px; font-weight: bold; background: #eee; color: #999; border: none; cursor: pointer; }
        .type-btn.active.minus { background: var(--red); color: white; }
        .type-btn.active.plus { background: var(--green); color: white; }

        .btn-calc { background: var(--main); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sub { background: #eee; color: #444; border: 1px solid #ddd; padding: 10px; width: 48%; border-radius: 10px; cursor: pointer; font-size: 12px; margin-top: 10px; font-weight: bold; }
        .btn-pdf { background: var(--accent); color: white; border: none; }

        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 500px; }
        th { background: var(--main); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: right; }
        .row-ev { background: #fffdf0; }
        .ev-label { display: block; font-size: 9px; color: var(--accent); }
        .btn-del { background: #ddd; color: #666; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
        
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>みらい航路シミュレーター</h2>
    <div id="alert"></div>

    <div class="no-print">
        <div class="section-title">積立期（資産をつくる）</div>
        <div class="grid">
            <div class="item"><label>現在の資産(円)</label><input type="number" id="cap" value="1000000"></div>
            <div class="item"><label>運用年利(%)</label><input type="number" id="yld" value="5"></div>
            <div class="item"><label>毎月の積立額(円)</label><input type="number" id="dep" value="10000"></div>
            <div class="item"><label>積立期間(年)</label><input type="number" id="dep_yrs" value="20"></div>
        </div>

        <div class="section-title">リタイア期（資産を活かす）</div>
        <div class="grid">
            <div class="item"><label>引退後の取崩(月額)</label><input type="number" id="with" value="100000"></div>
            <div class="item"><label>インフレ率(%)</label><input type="number" id="inf" value="1.5"></div>
            <div class="item"><label>表示期間(年)</label><input type="number" id="total" value="50"></div>
        </div>

        <div class="section-title">ライフイベント</div>
        <div class="preset-btns">
            <button class="btn-p" onclick="addEv('大学入学', 18, 4000000, -1)">＋ 大学入学</button>
            <button class="btn-p" onclick="addEv('住宅購入', 10, 5000000, -1)">＋ 住宅購入</button>
            <button class="btn-p" onclick="addEv('退職金', 25, 10000000, 1)">＋ 退職金</button>
            <button class="btn-p" onclick="addEv('自由追加', '', '', -1)">＋ 追加</button>
        </div>
        <div id="evList"></div>
        
        <button class="btn-calc" onclick="run()">航路図を描く</button>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-sub" onclick="exportCSV()">CSVで保存</button>
            <button class="btn-sub btn-pdf" onclick="window.print()">PDF/レポート出力</button>
        </div>
    </div>

    <div class="chart-wrap" style="height: 300px; margin: 20px 0;"><canvas id="chart"></canvas></div>
    <div id="out" class="table-wrap"></div>
</div>

<script>
let myChart = null;
let results = [];

function addEv(name="", year="", amt="", type=-1) {
    const div = document.createElement('div');
    div.className = 'ev-row';
    div.innerHTML = `
        <input type="text" value="${name}" class="ev-n" placeholder="内容">
        <input type="number" value="${year}" class="ev-y" placeholder="年後">
        <div class="type-switch no-print">
            <div class="type-btn minus ${type===-1?'active':''}" onclick="toggleType(this, -1)">－</div>
            <div class="type-btn plus ${type===1?'active':''}" onclick="toggleType(this, 1)">＋</div>
        </div>
        <input type="number" value="${amt}" class="ev-a" placeholder="金額">
        <button class="btn-del no-print" onclick="this.parentElement.remove()">✕</button>
        <input type="hidden" class="ev-t" value="${type}">
    `;
    document.getElementById('evList').appendChild(div);
}

function toggleType(btn, val) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    parent.parentElement.querySelector('.ev-t').value = val;
}

function run() {
    const cap = parseFloat(document.getElementById('cap').value) || 0;
    const yld = (parseFloat(document.getElementById('yld').value) || 0) / 100 / 12;
    const dep = parseFloat(document.getElementById('dep').value) || 0;
    const depY = parseInt(document.getElementById('dep_yrs').value) || 0;
    const withdr = parseFloat(document.getElementById('with').value) || 0;
    const inf = (parseFloat(document.getElementById('inf').value) || 0) / 100;
    const totalY = parseInt(document.getElementById('total').value) || 1;

    let evs = {};
    document.querySelectorAll('.ev-row').forEach(row => {
        let y = parseInt(row.querySelector('.ev-y').value);
        let a = (parseFloat(row.querySelector('.ev-a').value) || 0) * parseInt(row.querySelector('.ev-t').value);
        if (y > 0) evs[y] = { n: row.querySelector('.ev-n').value, a: a };
    });

    let cur = cap;
    let lbls = [], v1 = [], v2 = [];
    results = [];
    let deathY = null;
    let html = '<table><thead><tr><th>時期</th><th>年初</th><th>年間収支/イベント</th><th>年末残高</th><th>実質価値</th></tr></thead><tbody>';

    for (let y = 1; y <= totalY; y++) {
        let start = cur;
        let flow = 0;
        for (let m = 0; m < 12; m++) {
            if (y <= depY) { cur += dep; flow += dep; }
            else { cur -= withdr; flow -= withdr; }
            let p = cur * yld;
            let tax = p > 0 ? p * 0.20315 : 0;
            cur += (p - tax); flow += (p - tax);
        }
        if (evs[y]) { cur += evs[y].a; flow += evs[y].a; }
        if (cur < 0) { cur = 0; if (!deathY) deathY = y; }

        let real = cur / Math.pow((1 + inf), y);
        lbls.push(y + "年後"); 
        v1.push(Math.round(cur)); 
        v2.push(Math.round(real));
        results.push({y: y + "年後", start, flow, cur, real, ev: evs[y] ? `${evs[y].n}(${evs[y].a})` : ''});

        html += `<tr class="${evs[y]?'row-ev':''}">
            <td style="text-align:center;">${y}年後</td>
            <td>${Math.round(start).toLocaleString()}</td>
            <td>${Math.round(flow).toLocaleString()}${evs[y]?`<br><span class="ev-label">${evs[y].n}(${evs[y].a.toLocaleString()})</span>`:''}</td>
            <td><b>${Math.round(cur).toLocaleString()}</b></td>
            <td>${Math.round(real).toLocaleString()}</td>
        </tr>`;
    }
    document.getElementById('out').innerHTML = html + '</tbody></table>';
    
    const ab = document.getElementById('alert');
    if (deathY) { ab.style.display='block'; ab.innerHTML=`🚢 航路警告：${deathY}年後に資産が枯渇する可能性があります。`; }
    else { ab.style.display='none'; }

    if (typeof Chart !== 'undefined') {
        const ctx = document.getElementById('chart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: lbls,
                datasets: [{ label: '将来残高', data: v1, borderColor: '#1a2a44', fill: true, backgroundColor: 'rgba(26,42,68,0.1)', tension: 0.3 },
                           { label: '今の価値', data: v2, borderColor: '#c5a059', borderDash: [5,5], tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
}

function exportCSV() {
    if (results.length === 0) { alert("まずはシミュレーションを実行してください"); return; }
    let csv = "\uFEFF時期,年初残高,年間収支(運用込),年末残高,実質価値(インフレ考慮),イベント内容\n";
    results.forEach(r => {
        csv += `${r.y},${Math.round(r.start)},${Math.round(r.flow)},${Math.round(r.cur)},${Math.round(r.real)},"${r.ev}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "みらい航路シミュレーション結果.csv";
    link.click();
}

window.onload = run;
</script>
</body>
</html>
